name: Ersan Elektrik Turbo CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test-and-deploy:
    name: Test ve Otomatik Yukle
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ersan_elk_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Kodu Klonla (Checkout)
      uses: actions/checkout@v4

    # --- ÖNBELLEKLEME (CACHE) ADIMLARI ---
    - name: PHP 8.2 Ortamini Kur
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, pdo, pdo_mysql, curl, zip
        coverage: none

    - name: Önbelleklenmis Composer Paketlerini Getir
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}

    - name: Node.js Ortamini Kur
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Playwright Tarayicilarini Cache'den Getir
      id: playwright-cache
      uses: actions/cache@v3
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

    # --- KURULUM ---
    - name: Bagimliliklari Hizlica Kur
      run: |
        composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install

    - name: Playwright Kur (Eger Cache Yoksa)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    - name: CI iCİN ENV HAZIRLA
      run: |
        touch .env
        echo "APP_ENV=testing" >> .env
        echo "DB_HOST=127.0.0.1" >> .env
        echo "DB_NAME=ersan_elk_test" >> .env
        echo "DB_USER=root" >> .env
        echo "DB_PASS=root" >> .env

    # --- TESTLER (Hizli Gecme Mantigi Eklenebilir) ---
    - name: Backend Testlerini Kos (Pest)
      run: vendor/bin/pest

    - name: E2E UI Testlerini Kos
      # Eger commit mesajinda [skip tests] varsa bu adimi atlar
      if: "!contains(github.event.head_commit.message, '[skip tests]')"
      env:
        PLAYWRIGHT_BASE_URL: "http://localhost:8000"
      run: |
        php -S localhost:8000 -t ./ &
        npx playwright test tests/e2e/e2e.spec.ts --project=chromium --reporter=list

    # --- DEPLOY (AYNI MAKINA ICINDE) ---
    - name: FTP ile Sunucuya Yukle
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /repositories/ersan_elk/
