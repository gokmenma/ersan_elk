name: Ersan Elektrik Otomatik Yukle

on:
  push:
    branches: [ "master", "main" ]

jobs:
  deploy:
    name: FTP ile Yukle
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: FTP ile Dosya Temizligi ve Yukleme
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /repositories/ersan_elk/
        # Büyük ve gereksiz klasörleri hariç tutuyoruz (Timeout engellemek için)
        # NOT: .env hariç tutulur -> sunucudaki mevcut .env SiLiNMEZ ve üzerine yazılmaz
        exclude: |
          **/.git*
          **/.env
          **/node_modules/**
          **/test-results/**
          **/playwright-report/**
          **/vendor/**
