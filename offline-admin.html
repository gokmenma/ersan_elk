<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevrimdışı - Ersan Elektrik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap');


        body {
            font-family: 'Roboto Condensed', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f6f6f8 0%, #e8eaf0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .icon-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(19, 91, 236, 0.1) 0%, rgba(19, 91, 236, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        .material-symbols-outlined {
            font-size: 64px;
            color: #135bec;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #0d121b;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            background: #135bec;
            color: white;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(19, 91, 236, 0.3);
        }

        .btn:hover {
            background: #0d47c1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(19, 91, 236, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn .material-symbols-outlined {
            font-size: 20px;
            color: white;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-container">
            <span class="material-symbols-outlined">wifi_off</span>
        </div>

        <h1>Çevrimdışısınız</h1>

        <p>
            İnternet bağlantınız yok gibi görünüyor.
            Lütfen bağlantınızı kontrol edin ve tekrar deneyin.
        </p>

        <button class="btn" onclick="location.reload()">
            <span class="material-symbols-outlined">refresh</span>
            Tekrar Dene
        </button>
    </div>

    <div class="status-bar">
        <span class="status-dot"></span>
        <span class="status-text">İnternet bağlantısı bekleniyor...</span>
    </div>

    <script>
        // Bağlantı geldiğinde otomatik yenile
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>

</html>
